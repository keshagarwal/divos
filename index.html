<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divos — Outcome Tracking</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--card:#1c2333;--card2:#222940;
  --border:#2a3348;--text:#e8eaf0;--text2:#9aa3b8;--muted:#5a6480;
  --accent:#f97316;--acbg:rgba(249,115,22,.13);
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --indigo:#6366f1;--purple:#a855f7;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;background:var(--bg2)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--card2)}

/* Sidebar */
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:18px 16px 14px;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-.5px;border-bottom:1px solid var(--border)}
.nav-group{padding:16px 10px 4px}
.nav-group-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;position:relative;margin-bottom:2px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--acbg);color:var(--accent)}
.nav-item svg{flex-shrink:0;opacity:.8}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#topbar-title{font-size:16px;font-weight:600;flex:1}
#content{flex:1;overflow-y:auto;padding:24px}

/* Iceberg */
.iceberg{display:flex;gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.iceberg-tile{flex:1;background:var(--card);padding:14px 10px;text-align:center}
.iceberg-tile.clickable{cursor:pointer;transition:background .15s}
.iceberg-tile.clickable:hover{background:var(--card2)}
.iceberg-tile.active{background:var(--acbg);border-bottom:2px solid var(--accent)}
.it-val{font-size:22px;font-weight:700;line-height:1}
.it-lbl{font-size:11px;color:var(--muted);margin-top:4px}

/* Sections */
.section-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border:1px solid var(--border);border-radius:10px;margin-bottom:4px;background:var(--card);user-select:none}
.section-hd.collapsed .s-chevron{transform:rotate(-90deg)}
.section-body{margin-bottom:16px}
.section-body.hidden{display:none}
.s-title{font-size:13px;font-weight:600}
.s-pill{font-size:11px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px 8px}
.s-chevron{margin-left:auto;transition:transform .2s;color:var(--muted)}

/* Stat row */
.stat-row{display:grid;gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.s-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.s-val{font-size:24px;font-weight:700;margin-top:6px;line-height:1.1}

/* Goal cards */
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .15s;cursor:pointer;margin-bottom:10px}
.goal-card:hover{border-color:var(--accent)}
.goal-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}

/* View toggle */
.view-toggle{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.vt-btn{padding:5px 12px;border-radius:6px;border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.vt-btn.active{background:var(--card2);color:var(--text)}

/* Kanban */
.kanban-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px}
.kanban-col-hd{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:4px 4px 10px}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer}
.kanban-card:hover{border-color:var(--accent)}

/* Breadcrumb */
.breadcrumb{font-size:13px;color:var(--muted);margin-bottom:16px}
.bc-link{color:var(--accent);cursor:pointer}
.bc-link:hover{text-decoration:underline}
.bc-sep{margin:0 6px}

/* Chips */
.health-chip{font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer;display:inline-block}
.chip-g{background:rgba(34,197,94,.15);color:var(--green)}
.chip-y{background:rgba(234,179,8,.15);color:var(--yellow)}
.chip-r{background:rgba(239,68,68,.15);color:var(--red)}
.chip-n{background:var(--bg2);color:var(--muted)}

/* Info/warn box */
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:12px}
.info-box.warn{border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.06)}
.info-box.danger{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06)}

/* Progress bar */
.pbar-wrap{background:var(--bg2);border-radius:4px;overflow:hidden;height:6px}
.pbar-fill{height:100%;border-radius:4px;transition:width .3s}

/* Avatar */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;flex-shrink:0}
.av-sm{width:24px;height:24px;font-size:10px}

/* Pills */
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;line-height:1.5}
.pill-green{background:rgba(34,197,94,.15);color:var(--green)}
.pill-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red)}
.pill-orange{background:rgba(249,115,22,.2);color:var(--accent)}
.pill-muted{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}
.pill-indigo{background:rgba(99,102,241,.15);color:var(--indigo)}
.pill-purple{background:rgba(168,85,247,.15);color:var(--purple)}

/* RAG badge */
.rag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.rag-green{background:rgba(34,197,94,.15);color:var(--green)}
.rag-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.rag-red{background:rgba(239,68,68,.15);color:var(--red)}
.rag-none{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* Buffer bar */
.buf-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--bg2);margin:8px 0}
.buf-seg{height:100%}

/* Action btn */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-ghost{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-accent{background:var(--accent);color:#fff}

/* Archive btn */
.arch-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:5px;display:inline-flex;align-items:center;transition:color .15s}
.arch-btn:hover{color:var(--text)}

/* Card with header */
.card-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.card-hd-title{font-size:13px;font-weight:600;flex:1}

/* Gantt */
.gantt-wrap{overflow-x:auto;padding:14px}
.gantt-grid{display:grid;min-width:900px}
.gantt-hd{display:grid;grid-template-columns:220px 1fr;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:4px}
.gantt-months{display:flex}
.gantt-month{flex:1;font-size:10px;color:var(--muted);text-align:center;font-weight:600;text-transform:uppercase}
.gantt-row{display:grid;grid-template-columns:220px 1fr;padding:5px 0;border-bottom:1px solid rgba(42,51,72,.5);align-items:center}
.gantt-label{font-size:12px;color:var(--text2);padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{position:relative;height:20px}
.gantt-bar{position:absolute;height:16px;top:2px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;min-width:8px}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);opacity:.7}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:1000}

/* Bottleneck row */
.bn-row{border-left:3px solid var(--accent) !important;background:rgba(249,115,22,.06) !important}

/* Archived opacity */
.archived-item{opacity:.55}

/* Board */
.board-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px}
.board-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px}
.board-col-hd{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:4px 4px 10px}
.board-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px}

/* Stub placeholder */
.stub-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted)}
.stub-wrap svg{opacity:.3}
.stub-wrap h2{font-size:18px;color:var(--text2)}
.stub-wrap p{font-size:13px;max-width:320px;text-align:center}
</style>

var currentView = 'outcomes';
var taskViewMode = 'list';
var outcomeViewMode = 'list';
var viewCtx = {};
var prevView = null;
var prevCtx = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
var avColors = {
  KA:'#6366f1',AM:'#a855f7',VV:'#22c55e',PM:'#f97316',
  SG:'#eab308',DP:'#ef4444',HR:'#06b6d4',SB:'#ec4899'
};

function avatar(initials, size) {
  var sz = size === 'sm' ? 24 : 28;
  var fs = size === 'sm' ? 10 : 11;
  var bg = avColors[initials] || '#5a6480';
  return '<span class="av" style="width:' + sz + 'px;height:' + sz + 'px;font-size:' + fs + 'px;background:' + bg + ';color:#fff">' + initials + '</span>';
}

function rag(status) {
  if (status === 'green') return '<span class="rag rag-green"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block"></span>On Track</span>';
  if (status === 'yellow') return '<span class="rag rag-yellow"><span style="width:7px;height:7px;border-radius:50%;background:var(--yellow);display:inline-block"></span>At Risk</span>';
  if (status === 'red') return '<span class="rag rag-red"><span style="width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block"></span>Off Track</span>';
  return '<span class="rag rag-none">Not Set</span>';
}

function hbar(pct, h) {
  h = h || 6;
  var color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  return '<div class="pbar-wrap" style="height:' + h + 'px"><div class="pbar-fill" style="width:' + Math.min(100,pct) + '%;background:' + color + ';height:100%"></div></div>';
}

function deliveryBadge(p) {
  if (p.deliveredE) return '<span class="pill pill-green">' + p.deliveredE + 'd early</span>';
  if (p.deliveredL) return '<span class="pill pill-red">' + p.deliveredL + 'd late</span>';
  return '<span style="color:var(--muted);font-size:12px">—</span>';
}

function typeBadge(type) {
  if (type === 'delegated') return '<span class="pill pill-indigo">Delegated</span>';
  if (type === 'owned') return '<span class="pill pill-purple">Owned</span>';
  if (type === 'cross-functional') return '<span class="pill pill-muted">Cross-func</span>';
  return '';
}

function approvalBadge(status) {
  if (status === 'approved') return '<span class="pill pill-green">Approved</span>';
  return '<span class="pill pill-yellow">Pending</span>';
}

function chipClass(status) {
  if (status === 'green') return 'chip-g';
  if (status === 'yellow') return 'chip-y';
  if (status === 'red') return 'chip-r';
  return 'chip-n';
}

function delayBar(t) {
  var maxDays = 10;
  var lateDays = t.delayDays || 0;
  var earlyDays = t.earlyDays || 0;
  var leftPct = 0, rightPct = 0, label = '';
  if (t.done) {
    if (lateDays > 0) {
      rightPct = Math.min(100, lateDays / maxDays * 100);
      label = '<span style="font-size:11px;color:var(--red)">' + lateDays + 'd' + (t.delayHrs ? ' ' + t.delayHrs + 'h' : '') + ' late</span>';
    } else if (earlyDays > 0) {
      leftPct = Math.min(100, earlyDays / maxDays * 100);
      label = '<span style="font-size:11px;color:var(--green)">' + earlyDays + 'd early</span>';
    } else {
      label = '<span style="font-size:11px;color:var(--green)">On time</span>';
    }
  } else if (lateDays > 0) {
    rightPct = Math.min(100, lateDays / maxDays * 100);
    label = '<span style="font-size:11px;color:var(--red)">' + lateDays + 'd' + (t.delayHrs ? ' ' + t.delayHrs + 'h' : '') + ' late</span>';
  } else {
    return '<span style="font-size:11px;color:var(--muted)">—</span>';
  }
  var bar = '<div style="width:90px;height:6px;background:var(--bg2);border-radius:3px;position:relative;overflow:visible">'
    + (leftPct > 0 ? '<div style="position:absolute;right:50%;width:' + (leftPct / 2) + '%;height:100%;background:var(--green);border-radius:3px 0 0 3px"></div>' : '')
    + (rightPct > 0 ? '<div style="position:absolute;left:50%;width:' + (rightPct / 2) + '%;height:100%;background:var(--red);border-radius:0 3px 3px 0"></div>' : '')
    + '<div style="position:absolute;left:calc(50% - 0.5px);top:-1px;width:1px;height:8px;background:var(--muted);opacity:.6"></div>'
    + '</div>';
  return '<div style="display:flex;flex-direction:column;gap:4px">' + bar + label + '</div>';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity = '0'; }, 2500);

function toggleSection(id) {

function archiveItem(type, id) {
  if (type === 'goal') {
    var g = goals.find(function(x){ return x.id === id; });

  } else {

    if (p) { p.archived = !p.archived; showToast(p.archived ? 'Project archived' : 'Project restored'); }
  }
  render();
}

// ─── CCPM ─────────────────────────────────────────────────────────────────────
function computeCCPM(tasks) {
  var ccTasks = tasks.filter(function(t){ return !t.parallel; });
  var projectBuffer = ccTasks.reduce(function(s,t){ return s + t.tatDays; }, 0) * 0.5;
  var bufferConsumed = ccTasks.reduce(function(s,t){
    if (t.done) return s + (t.delayDays - t.earlyDays);
    return s;
  }, 0);
  bufferConsumed = Math.max(0, bufferConsumed);
  var bufferRemaining = Math.max(0, projectBuffer - bufferConsumed);
  var bufferPct = projectBuffer > 0 ? (bufferConsumed / projectBuffer * 100) : 0;
  var bufferStatus = bufferPct > 66 ? 'red' : bufferPct > 33 ? 'yellow' : 'green';
  var activeBottleneck = null;
  for (var i = 0; i < tasks.length; i++) {
    if (!tasks[i].parallel && !tasks[i].done) { activeBottleneck = i; break; }
  }
  var feedingAtRisk = {};
  tasks.forEach(function(t, i){
    if (t.parallel) {
      var fb = t.tatDays * 0.5;
      var fc = Math.min(fb, t.delayDays);
      var fpct = fb > 0 ? (fc / fb * 100) : 0;
      feedingAtRisk[i] = { pct: fpct, exhausted: fpct >= 100, low: fpct >= 40 };
    }
  });
  return { projectBuffer: projectBuffer, bufferConsumed: bufferConsumed,
    bufferRemaining: bufferRemaining, bufferPct: bufferPct, bufferStatus: bufferStatus,
    activeBottleneck: activeBottleneck, feedingAtRisk: feedingAtRisk };
}

// ─── GANTT HELPERS ────────────────────────────────────────────────────────────
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parsePlanDate(str) {
  if (!str) return null;
  var parts = str.split(', ');
  var dateParts = parts[0].split(' ');
  var day = parseInt(dateParts[0]);
  var mon = MONTHS.indexOf(dateParts[1]);
  if (mon === -1) return null;
  return new Date(2026, mon, day);
}

function ganttBarLeft(date) {
  var start = new Date(2026, 0, 1);
  var end = new Date(2026, 11, 31);
  var total = end - start;
  var offset = date - start;
  return Math.max(0, Math.min(100, offset / total * 100));
}

function ganttTodayLeft() {
  return ganttBarLeft(new Date(2026, 5, 1));
}

function ganttBarWidth(tatDays) {
  return Math.max(1, tatDays / 365 * 100);
}

      var sid = ('pg-' + g.id);
      var pGreen = gps.filter(function(p){return p.actual==='green';}).length;
      var pYellow = gps.filter(function(p){return p.actual==='yellow';}).length;
      var pRed = gps.filter(function(p){return p.actual==='red';}).length;
      sectionsHtml += '<div id="sh-' + sid + '" class="section-hd" onclick="toggleSection(\'' + sid + '\')">'
        + '<span class="s-title">' + cat + ' › <span style="color:var(--text2);font-weight:400">' + g.name.substring(0,50) + (g.name.length>50?'…':'') + '</span></span>'
        + '<span class="s-pill">' + gps.length + ' projects</span>'
        + (pGreen?'<span style="font-size:11px;color:var(--green)">' + pGreen + ' ●</span>':'')
        + (pYellow?'<span style="font-size:11px;color:var(--yellow)">' + pYellow + ' ●</span>':'')
        + (pRed?'<span style="font-size:11px;color:var(--red)">' + pRed + ' ●</span>':'')
        + chevSvg() + '</div>';
      sectionsHtml += '<div id="sb-' + sid + '" class="section-body"><div style="overflow-x:auto"><table>'
        + '<thead><tr><th>Project</th><th>Type</th><th>Approval</th><th>Due</th><th>Owner</th><th>Progress</th><th>Delivery</th><th>Status</th><th></th></tr></thead><tbody>';
      gps.forEach(function(p){
        sectionsHtml += '<tr style="cursor:pointer" onclick="navigate(\'project-detail\',{projectId:\'' + p.id + '\',from:\'projects\'})">'
          + '<td style="font-weight:500">' + p.name + '</td>'
          + '<td>' + typeBadge(p.type) + '</td>'
          + '<td>' + approvalBadge(p.approvalStatus) + '</td>'
          + '<td style="white-space:nowrap">' + p.due + (p.proposedDue?'<br><span style="font-size:11px;color:var(--yellow)">→ ' + p.proposedDue + '</span>':'') + '</td>'
          + '<td>' + avatar(p.owner,'sm') + ' <span style="font-size:12px">' + p.ownerName + '</span></td>'
          + '<td style="min-width:100px">' + hbar(p.health) + '<span style="font-size:11px;color:var(--text2)">' + p.health + '%</span></td>'
          + '<td>' + deliveryBadge(p) + '</td>'
          + '<td>' + rag(p.actual) + '</td>'
          + '<td><button class="arch-btn" onclick="event.stopPropagation();archiveItem(\'project\',\'' + p.id + '\')">' + archSvg() + '</button></td>'
          + '</tr>';
      });
      sectionsHtml += '</tbody></table></div></div>';
    });
  });

  return iceHtml + sectionsHtml;
}

// ─── VIEW: PROJECT DETAIL ─────────────────────────────────────────────────────
function renderProjectDetail() {
  var pid = viewCtx.projectId;
  var p = projects.find(function(x){ return x.id === pid; });
  if (!p) return '<p>Project not found.</p>';
  var g = goals.find(function(x){ return x.id === p.goalId; });
  var tasks = tasksData[pid] || [];
  var ccpm = computeCCPM(tasks);
  var vm = taskViewMode;

  var breadcrumb = '<div class="breadcrumb">';
  if (viewCtx.from === 'projects') {
    breadcrumb += '<span class="bc-link" onclick="navigate(\'projects\')">All Projects</span>'
      + '<span class="bc-sep">›</span><span>' + p.name + '</span>';
  } else {
    breadcrumb += '<span class="bc-link" onclick="navigate(\'outcomes\')">Outcomes</span>'
      + '<span class="bc-sep">›</span>'
      + (g ? '<span class="bc-link" onclick="navigate(\'outcome-detail\',{goalId:\'' + g.id + '\'})">' + g.name.substring(0,40) + (g.name.length>40?'…':'') + '</span>' : '')
      + '<span class="bc-sep">›</span><span>' + p.name + '</span>';
  }
  breadcrumb += '</div>';

  var bufColor = ccpm.bufferStatus === 'red' ? 'var(--red)' : ccpm.bufferStatus === 'yellow' ? 'var(--yellow)' : 'var(--green)';
  var bufPctClamped = Math.min(100, ccpm.bufferPct);
  var bufBar = '<div class="buf-bar">'
    + '<div class="buf-seg" style="width:' + (100-bufPctClamped) + '%;background:var(--green);opacity:.7"></div>'
    + '<div class="buf-seg" style="width:' + bufPctClamped + '%;background:' + bufColor + '"></div>'
    + '</div>';
  var bnTask = ccpm.activeBottleneck !== null ? tasks[ccpm.activeBottleneck] : null;

  var statRow = '<div class="stat-row" style="grid-template-columns:repeat(5,1fr)">'
    + '<div class="stat-card"><div class="s-label">Milestone</div><div style="font-size:13px;font-weight:500;margin-top:6px;line-height:1.4">' + p.milestone + '</div>'
    + '<div style="font-size:11px;color:var(--text2);margin-top:6px">Due: ' + p.due + (p.proposedDue ? ' → <span style="color:var(--yellow)">' + p.proposedDue + '</span>' : '') + '</div></div>'
    + '<div class="stat-card"><div class="s-label">Task Health</div>'
    + '<div style="margin-top:8px">' + hbar(p.health, 8) + '</div>'
    + '<div style="font-size:13px;margin-top:6px"><strong>' + p.done + '</strong> done · <strong style="color:' + (p.delayed?'var(--red)':'var(--text)') + '">' + p.delayed + '</strong> delayed</div></div>'
    + '<div class="stat-card"><div class="s-label">Planned Signal</div><div style="margin-top:10px">' + rag(p.planned) + '</div></div>'
    + '<div class="stat-card"><div class="s-label">Delivery</div><div style="margin-top:10px">' + deliveryBadge(p) + ' ' + rag(p.actual) + '</div></div>'
    + '<div class="stat-card"><div class="s-label">Project Buffer (CCPM)</div>'
    + bufBar
    + '<div style="font-size:13px;font-weight:600;color:' + bufColor + '">' + Math.round(ccpm.bufferRemaining) + 'd left of ' + Math.round(ccpm.projectBuffer) + 'd</div>'
    + (bnTask ? '<div style="font-size:11px;color:var(--muted);margin-top:4px">Bottleneck: ' + bnTask.name.substring(0,30) + '</div>' : '')
    + '</div>'
    + '</div>';

  var warnings = '';
  if (p.planned !== p.actual) {
    warnings += '<div class="info-box warn">⚠ RAG mismatch: planned as <strong>' + p.planned + '</strong> but currently <strong>' + p.actual + '</strong></div>';
  }
  if (p.delayed > 0) {
    warnings += '<div class="info-box danger">⚠ ' + p.delayed + ' task' + (p.delayed!==1?'s are':' is') + ' overdue in this project</div>';
  }

  var toggleHtml = '<div class="view-toggle">'
    + '<button class="vt-btn' + (vm==='list'?' active':'') + '" onclick="taskViewMode=\'list\';render()">List</button>'
    + '<button class="vt-btn' + (vm==='board'?' active':'') + '" onclick="taskViewMode=\'board\';render()">Board</button>'
    + '<button class="vt-btn' + (vm==='gantt'?' active':'') + '" onclick="taskViewMode=\'gantt\';render()">Gantt</button>'
    + '</div>';

  var tasksContent = '';
  if (vm === 'list') {
    tasksContent = '<div style="overflow-x:auto"><table>'
      + '<thead><tr><th>Task</th><th>DRI</th><th>Timeline</th><th>Planned</th><th>Actual</th><th>Status</th></tr></thead><tbody>';
    tasks.forEach(function(t, i){
      var isBn = i === ccpm.activeBottleneck;
      var feed = ccpm.feedingAtRisk[i];
      var rowStyle = isBn ? ' class="bn-row"' : '';
      var badges = '';
      if (isBn) badges += ' <span class="pill pill-orange">bottleneck</span>';
      if (t.parallel) {
        if (feed && feed.exhausted) badges += ' <span class="pill pill-red">⚠ now critical</span>';
        else if (feed && feed.low) badges += ' <span class="pill pill-yellow">buffer low</span>';
        else badges += ' <span class="pill pill-muted">parallel</span>';
      }
      var delayLabel = '';
      if (t.done) {
        if (t.delayDays > 0 || t.delayHrs > 0) delayLabel = '<span style="color:var(--red)">' + t.delayDays + 'd ' + (t.delayHrs?t.delayHrs+'h':'') + ' late</span>';
        else if (t.earlyDays > 0 || t.earlyHrs > 0) delayLabel = '<span style="color:var(--green)">' + t.earlyDays + 'd early</span>';
        else delayLabel = '<span style="color:var(--green)">On time</span>';
      } else if (t.delayDays > 0 || t.delayHrs > 0) {
        delayLabel = '<span style="color:var(--red)">' + t.delayDays + 'd ' + (t.delayHrs?t.delayHrs+'h':'') + ' late</span>';
      } else {
        delayLabel = '<span style="color:var(--muted)">—</span>';
      }
      var statusBadge = '';
      if (t.done) statusBadge = '<span class="pill pill-green">Done</span>';
      else if (t.due === 'overdue') statusBadge = '<span class="pill pill-red">Overdue</span>';
      else statusBadge = '<span class="pill pill-green" style="background:rgba(34,197,94,.08)">On Track</span>';
      tasksContent += '<tr' + rowStyle + '>'
        + '<td style="' + (t.done?'text-decoration:line-through;color:var(--text2)':'') + '">' + t.name + badges + '</td>'
        + '<td style="white-space:nowrap">' + avatar(t.assignee,'sm') + ' <span style="font-size:12px">' + t.doer + '</span></td>'
        + '<td style="min-width:120px">' + delayBar(t) + '</td>'
        + '<td style="font-size:12px;color:var(--text2)">' + t.planDate + '</td>'
        + '<td style="font-size:12px;color:var(--text2)">' + (t.actualDate || '—') + '</td>'
        + '<td>' + statusBadge + '</td>'
        + '</tr>';
    });
    tasksContent += '</tbody></table></div>';
  } else if (vm === 'board') {
    var bcols = [
      {key:'done', label:'Done', tasks: tasks.filter(function(t){return t.done;})},
      {key:'upcoming', label:'Upcoming', tasks: tasks.filter(function(t){return !t.done && t.due==='future';})},
      {key:'today', label:'Today', tasks: tasks.filter(function(t){return !t.done && t.due==='today';})},
      {key:'overdue', label:'Overdue', tasks: tasks.filter(function(t){return !t.done && t.due==='overdue';})},
    ];
    tasksContent = '<div class="board-wrap">';
    bcols.forEach(function(col){
      tasksContent += '<div class="board-col"><div class="board-col-hd">' + col.label + ' <span style="color:var(--text)">' + col.tasks.length + '</span></div>';
      col.tasks.forEach(function(t){
        var dl = t.done && (t.delayDays||t.earlyDays) ? (t.delayDays>0?'<span style="color:var(--red);font-size:11px">'+t.delayDays+'d late</span>':'<span style="color:var(--green);font-size:11px">'+t.earlyDays+'d early</span>') : '';
        tasksContent += '<div class="board-card">'
          + '<div style="font-weight:500;margin-bottom:8px;' + (t.done?'text-decoration:line-through;color:var(--text2)':'') + '">' + t.name + '</div>'
          + '<div style="margin-bottom:8px">' + delayBar(t) + '</div>'
          + '<div style="display:flex;align-items:center;justify-content:space-between">'
          + '<div style="display:flex;align-items:center;gap:5px">'
          + avatar(t.assignee,'sm')
          + '<span style="font-size:11px;color:var(--text2)">' + t.doer + '</span>'
          + '</div>'
          + '<span style="font-size:11px;color:var(--muted)">' + t.planDate + '</span>'
          + '</div></div>';
      });
      tasksContent += '</div>';
    });
    tasksContent += '</div>';
  } else if (vm === 'gantt') {
    var todayLeft = ganttTodayLeft();
    tasksContent = '<div class="gantt-wrap"><div class="gantt-grid">'
      + '<div class="gantt-hd"><div class="gantt-label" style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase">Task</div>'
      + '<div class="gantt-months">' + MONTHS.map(function(m){ return '<div class="gantt-month">' + m + '</div>'; }).join('') + '</div></div>';
    tasks.forEach(function(t, i){
      var d = parsePlanDate(t.planDate);
      var left = d ? ganttBarLeft(d) : 5;
      var w = ganttBarWidth(t.tatDays);
      var barColor = t.done ? 'var(--green)' : (t.due==='overdue' ? 'var(--red)' : (t.due==='today' ? 'var(--accent)' : 'var(--indigo)'));
      var isBn = i === ccpm.activeBottleneck;
      if (isBn) barColor = 'var(--accent)';
      tasksContent += '<div class="gantt-row">'
        + '<div class="gantt-label" style="' + (t.done?'color:var(--muted)':'') + '">' + t.name + '</div>'
        + '<div class="gantt-track" style="position:relative">'
        + '<div class="gantt-today" style="left:' + todayLeft + '%"></div>'
        + '<div class="gantt-bar" style="left:' + left + '%;width:' + w + '%;background:' + barColor + '">'
        + (t.delayDays>0?t.delayDays+'d late':t.earlyDays>0?t.earlyDays+'d early':'')
        + '</div></div></div>';
    });
    tasksContent += '</div></div>';
  }

  var taskCard = '<div class="card-wrap">'
    + '<div class="card-hd"><span class="card-hd-title">Tasks</span><div style="margin-left:auto">' + toggleHtml + '</div></div>'
    + tasksContent + '</div>';

  return breadcrumb + statRow + warnings + taskCard;
}

// ─── VIEW: MY TASKS ───────────────────────────────────────────────────────────
function renderMyTasks() {
  var allMyTasks = [];
  projects.forEach(function(p){
    var ts = tasksData[p.id] || [];
    ts.forEach(function(t, i){
      if (t.assignee === 'KA') allMyTasks.push({task:t, project:p, idx:i});
    });
  });

  var filter = viewCtx.filter || 'all';
  var total = allMyTasks.length;
  var done = allMyTasks.filter(function(x){return x.task.done;}).length;
  var overdue = allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='overdue';}).length;
  var today = allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='today';}).length;
  var upcoming = allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='future';}).length;

  var tiles = [
    {key:'all',label:'Total',val:total},
    {key:'done',label:'Done',val:done},
    {key:'overdue',label:'Overdue',val:overdue},
    {key:'today',label:'Today',val:today},
    {key:'upcoming',label:'Upcoming',val:upcoming},
  ];

  var filtered;
  if (filter==='done') filtered=allMyTasks.filter(function(x){return x.task.done;});
  else if(filter==='overdue') filtered=allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='overdue';});
  else if(filter==='today') filtered=allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='today';});
  else if(filter==='upcoming') filtered=allMyTasks.filter(function(x){return !x.task.done&&x.task.due==='future';});
  else filtered=allMyTasks;

  var iceHtml = '<div class="iceberg">';
  tiles.forEach(function(t){
    iceHtml += '<div class="iceberg-tile clickable' + (filter===t.key?' active':'') + '" onclick="navigate(\'mytasks\',{filter:\'' + t.key + '\'})">'
      + '<div class="it-val">' + t.val + '</div><div class="it-lbl">' + t.label + '</div></div>';
  });
  iceHtml += '</div>';

  var byProject = {};
  filtered.forEach(function(x){
    if (!byProject[x.project.id]) byProject[x.project.id] = {project:x.project, tasks:[]};
    byProject[x.project.id].tasks.push(x);
  });

  var sectionsHtml = '';
  Object.keys(byProject).forEach(function(pid){
    var grp = byProject[pid];
    var p = grp.project;
    var g = goals.find(function(x){return x.id===p.goalId;});
    var sid = 'mt-' + pid;
    sectionsHtml += '<div id="sh-' + sid + '" class="section-hd" onclick="toggleSection(\'' + sid + '\')">'
      + '<span class="s-title">' + p.name + '</span>'
      + '<span class="s-pill">' + grp.tasks.length + ' tasks</span>'
      + (g?'<span class="s-pill" style="color:var(--muted)">' + g.category + '</span>':'')
      + chevSvg() + '</div>'
      + '<div id="sb-' + sid + '" class="section-body"><div style="overflow-x:auto"><table>'
      + '<thead><tr><th>Task</th><th>DRI</th><th>Timeline</th><th>Planned</th><th>Actual</th><th>Status</th></tr></thead><tbody>';
    grp.tasks.forEach(function(x){
      var t = x.task;
      var statusBadge = t.done ? '<span class="pill pill-green">Done</span>'
        : t.due==='overdue' ? '<span class="pill pill-red">Overdue</span>'
        : t.due==='today' ? '<span class="pill pill-orange">Today</span>'
        : '<span class="pill pill-muted">Upcoming</span>';
      sectionsHtml += '<tr><td style="' + (t.done?'text-decoration:line-through;color:var(--text2)':'') + '">' + t.name + '</td>'
        + '<td style="white-space:nowrap">' + avatar(t.assignee,'sm') + ' <span style="font-size:12px">' + t.doer + '</span></td>'
        + '<td style="min-width:120px">' + delayBar(t) + '</td>'
        + '<td style="font-size:12px;color:var(--text2)">' + t.planDate + '</td>'
        + '<td style="font-size:12px;color:var(--text2)">' + (t.actualDate||'—') + '</td>'
        + '<td>' + statusBadge + '</td></tr>';
    });
    sectionsHtml += '</tbody></table></div></div>';
  });

  return iceHtml + sectionsHtml;
}

// ─── STUB VIEWS ───────────────────────────────────────────────────────────────
function renderStub(title, desc) {
  return '<div class="stub-wrap">'
    + '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>'
    + '<h2>' + title + '</h2>'
    + '<p>' + desc + '</p>'
    + '</div>';
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
var titleMap = {
  outcomes: 'Outcomes',
  'outcome-detail': 'Outcome Detail',
  projects: 'All Projects',
  'project-detail': 'Project Detail',
  mytasks: 'My Tasks',
  flows: 'Flows',
  loops: 'Loops',
  teamreview: 'Team Review',
  acemeeting: 'ACE Meeting',
  approvals: 'Approvals',
  settings: 'Settings',
};

function navigate(view, ctx) {
  prevView = currentView;
  prevCtx = viewCtx || {};
  currentView = view;
  viewCtx = ctx || {};
  render();
}

function render() {
  document.querySelectorAll('.nav-item').forEach(function(el){
    var v = el.getAttribute('data-view');
    el.classList.toggle('active', v === currentView || (currentView === 'outcome-detail' && v === 'outcomes') || (currentView === 'project-detail' && (prevView === 'projects' ? v === 'projects' : v === 'outcomes')));
  });

  var mainView = currentView;
  if (mainView === 'project-detail' || mainView === 'outcome-detail') {
    document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
    if (mainView === 'outcome-detail') {
      var navO = document.querySelector('.nav-item[data-view="outcomes"]');
      if (navO) navO.classList.add('active');
    } else if (mainView === 'project-detail') {
      var from = viewCtx.from || '';
      var navP = document.querySelector('.nav-item[data-view="' + (from==='projects'?'projects':'outcomes') + '"]');
      if (navP) navP.classList.add('active');
    }
  } else {
    document.querySelectorAll('.nav-item').forEach(function(el){
      el.classList.toggle('active', el.getAttribute('data-view') === currentView);
    });
  }

  document.getElementById('topbar-title').textContent = titleMap[currentView] || currentView;

  var content = '';
  if (currentView === 'outcomes') content = renderOutcomes();
  else if (currentView === 'outcome-detail') content = renderOutcomeDetail();
  else if (currentView === 'projects') content = renderProjects();
  else if (currentView === 'project-detail') content = renderProjectDetail();
  else if (currentView === 'mytasks') content = renderMyTasks();
  else if (currentView === 'flows') content = renderStub('Flows', 'Process flow maps and bottleneck analysis will appear here.');
  else if (currentView === 'loops') content = renderStub('Loops', 'Feedback loops and recurring review cycles will appear here.');
  else if (currentView === 'teamreview') content = renderStub('Team Review', 'Weekly team performance reviews and scorecards will appear here.');
  else if (currentView === 'acemeeting') content = renderStub('ACE Meeting', 'ACE (Accountability, Cadence, Execution) meeting agendas and notes will appear here.');
  else if (currentView === 'approvals') content = renderStub('Approvals', 'Pending approvals for projects and milestones will appear here. 2 items awaiting review.');
  else if (currentView === 'settings') content = renderStub('Settings', 'Application settings and preferences will appear here.');
  else content = '<p>View not found.</p>';

  document.getElementById('content').innerHTML = content;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
navigate('outcomes', {filter: 'need-attention'});
</script>
</body>
